<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cool Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
      background-size: 400% 400%;
      animation: gradient 12s ease infinite;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    @keyframes gradient {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.85;
      animation: fadeIn 3s ease-in-out;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      background: white;
      color: black;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: #00c6ff;
      color: white;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .glow {
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="glow">Welcome 👋</h1>
    <p>This is your cool GitHub Pages website. Clean, modern, and animated.</p>
    
    <button class="btn" onclick="changeText()">Click Me</button>
    
    <p id="message"></p>
  </div>

  <script>
    function changeText() {
      document.getElementById("message").innerText =
        "🚀 You just made something awesome!";
    }
  </script>
</body>
</html>
